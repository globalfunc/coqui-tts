version: "3.9"

services:
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/voicetts --ignore-existing;
      mc anonymous set public myminio/voicetts;
      exit 0;
      "

  ai-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      - S3_ENDPOINT=http://minio:9000
      - S3_USE_PATH_STYLE=true
      - COQUI_TOS_AGREED=1
      - S3_INTERNAL_URL=http://minio:9000/voicetts
    volumes:
      - tts-cache:/root/.local/share/tts
    depends_on:
      minio:
        condition: service_healthy

volumes:
  tts-cache:
  minio-data:
